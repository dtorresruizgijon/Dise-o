<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grid Abstracto</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
        }

        .grid-art {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            width: 600px;
            height: 600px;
            padding: 20px;
            background: #16213e;
            border-radius: 20px;
        }

        .piece {
            border-radius: 15px;
            transition: all 0.3s;
        }

        .piece:hover {
            transform: rotate(5deg) scale(1.05);
            filter: brightness(1.2);
        }

        /* Composición artística con diferentes tamaños */
        .piece1 {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }

        .piece2 {
            background: linear-gradient(45deg, #48dbfb, #0abde3);
            grid-column: 3 / 5;
            grid-row: 1 / 2;
        }

        .piece3 {
            background: linear-gradient(45deg, #feca57, #ff9f43);
            grid-column: 5 / 6;
            grid-row: 1 / 4;
        }

        .piece4 {
            background: linear-gradient(45deg, #ff9ff3, #f368e0);
            grid-column: 1 / 2;
            grid-row: 3 / 6;
        }

        .piece5 {
            background: linear-gradient(45deg, #1dd1a1, #10ac84);
            grid-column: 2 / 4;
            grid-row: 3 / 5;
        }

        .piece6 {
            background: linear-gradient(45deg, #576574, #222f3e);
            grid-column: 4 / 5;
            grid-row: 2 / 4;
        }

        .piece7 {
            background: linear-gradient(45deg, #c44569, #e66767);
            grid-column: 4 / 6;
            grid-row: 4 / 6;
        }

        .piece8 {
            background: linear-gradient(45deg, #786fa6, #574b90);
            grid-column: 2 / 3;
            grid-row: 5 / 6;
        }
    </style>
</head>
<body>
    <div class="grid-art">
        <div class="piece piece1"></div>
        <div class="piece piece2"></div>
        <div class="piece piece3"></div>
        <div class="piece piece4"></div>
        <div class="piece piece5"></div>
        <div class="piece piece6"></div>
        <div class="piece piece7"></div>
        <div class="piece piece8"></div>
    </div>
</body>
</html>
